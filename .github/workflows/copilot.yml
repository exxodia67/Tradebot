# GECE NOBETCISI: 15 dakikada bir calisir ama once PC'ye sorar.
# PC'deki bot Telegram'i dinliyorsa (409 Conflict) HICBIR SEY YAPMADAN cikar.
# PC kapaliysa nobeti alir: analiz + 🌙 onekli Telegram uyarilari.
# Not: free-tier cron hassas degildir (15 dk yerine bazen saatler atlayabilir)
# — bu bir yedek nobetcidir, ana calisma PC'dedir.
# Kurulum: repo Settings -> Secrets -> TELEGRAM_BOT_TOKEN = BotFather token'i
name: copilot

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}      # elle tetikleme (Actions sekmesinden)

permissions:
  contents: write            # durum dosyalarini geri commit etmek icin

concurrency:
  group: copilot
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Bagimliliklar
        run: pip install -e .

      - name: Gece nobetcisi (PC kapaliysa tek gecis)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TRADEBOT_STATE_DIR: ${{ github.workspace }}   # durum repo kokunde kalsin
        run: python -m tradebot.telegram_bot --once

      - name: Durumu kaydet (commit)
        run: |
          git config user.name "copilot-bot"
          git config user.email "copilot-bot@users.noreply.github.com"
          git add -f tg_state.json telegram_chat.json copilot_journal.db copilot_log.txt 2>/dev/null || true
          git diff --cached --quiet && echo "degisiklik yok" && exit 0
          git commit -m "copilot durum guncelleme [skip ci]"
          git pull --rebase origin ${GITHUB_REF_NAME} || true
          git push
